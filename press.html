---
layout: "wrapper"
title: "Press"
permalink: /press
---
<section class="press">
    <div class="container d-flex justify-content-center flex-row flex-wrap pt-4">
        <!-- Bootstrap classes are used to adjust the layout for different screen sizes. -->
        <!-- Liquid 'for' loop iterating thru the 'press' data file and creating a similar layout for each piece of media. -->
        {% for press in site.data.press %}
        <div class="press-item d-flex flex-column align-self-start justify-content-center">
            <a class="hover-link" href="{{ press.link }}">
                <!-- all images should have a 3 : 2 aspect ratio -->
                <img
                src="assets/images/pages/press/{{ press.image }}"
                alt="press picture"
                class="img-fluid press-image"
                />
                <div class="spacer pb-2"></div>
                <div class="press-title text-wrap mx-1">
                    <p>{{ press.title }}</p>
                </div>

                <div class="press-date text-wrap mx-1">
                    <p>{{ press.published }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
    <p class="text-center pt-5">Last Updated: {{ site.data.last-updated-dates.press }}</p>
</section>
